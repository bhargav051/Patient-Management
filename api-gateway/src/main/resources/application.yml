server:
  port: 4004

auth:
  service:
    url: http://auth-service:4005

spring:
  cloud:
    gateway:
      routes:

        # ===============================
        # Auth Service Route
        # ===============================
        - id: auth-service-route
          uri: http://auth-service:4005
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1


        # ===============================
        # Patient Service Route (Protected)
        # ===============================
        - id: patient-service-route
          uri: http://patient-service:4000
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=1
            - JwtValidation


        # ===============================
        # Patient Swagger Docs Route
        # ===============================
        - id: api-docs-patient-route
          uri: http://patient-service:4000
          predicates:
            - Path=/api-docs/patients
          filters:
            - RewritePath=/api-docs/patients,/v3/api-docs=